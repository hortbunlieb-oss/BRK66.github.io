<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRK | Premium Shoe Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   
    <style>
        :root {
            --primary-color: #ff4d05;
            --dark-color: #111111;
            --white: #ffffff;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--white);
            color: var(--dark-color);
            overflow: hidden; /* Prevents scrolling since it's a single home banner page */
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: transparent; /* Seamless blend over the image */
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Oswald', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--white);
            font-weight: 600;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        .cart {
            color: var(--white);
        }

        /* Hero Landing Style matching your image */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
                        url('https://images.unsplash.com/photo-1552346154-21d32810aba3?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
        }

        .hero-content h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero-content p {
            font-size: 1.2rem;
            font-weight: 300;
            margin-bottom: 30px;
        }

        .btn-shop {
            padding: 15px 45px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 5px;
            transition: var(--transition);
            display: inline-block;
        }

        .btn-shop:hover {
            background: #e64500;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            /*.nav-links { display: none; } */
            .hero-content h1 { font-size: 2.5rem; }
            .contact-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo">BRK</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="cart">
                <i class="fa-solid fa-cart-shopping"></i> (0)
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Step Into Style</h1>
                <p>New Winter Collection 2026 is out now!</p>
                <a href="shop.html" class="btn-shop">Shop Now</a>
            </div>
        </section>
    </main>

</body>
</html>
